<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#091117">
  <title>Page Not Found — Shahzaib Hassan</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 80% 10%, rgba(44, 116, 101, 0.25), transparent 35rem),
        #091117;
      color: #f1f6f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(620px, 100%);
      padding: 42px;
      border: 1px solid #293b45;
      border-radius: 18px;
      background: rgba(16, 26, 34, 0.9);
    }
    .code {
      color: #72e6be;
      font: 800 12px ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.14em;
    }
    h1 {
      margin: 16px 0 12px;
      font-size: clamp(34px, 8vw, 58px);
      letter-spacing: -0.05em;
    }
    p {
      color: #97a8b3;
      font-size: 17px;
      line-height: 1.65;
    }
    a {
      display: inline-flex;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 9px;
      background: #72e6be;
      color: #091117;
      font: 800 11px ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.08em;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="code">404 · PAGE NOT FOUND</div>
    <h1>This route doesn’t exist.</h1>
    <p>
      The page may have moved, or the address may be incorrect. Return to
      Shahzaib Hassan’s Flutter developer portfolio.
    </p>
    <a href="/">BACK TO PORTFOLIO</a>
  </main>
</body>
</html>
